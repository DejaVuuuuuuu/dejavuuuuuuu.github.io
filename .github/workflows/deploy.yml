name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ] # 确保这里和你推送的分支名一致

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- 关键的一步：强制升级 Node.js ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 强制使用 Node 22，满足 Astro 6 的要求
          cache: 'npm'

      - name: Install, build, and upload with npm
        uses: withastro/action@v3
        # 这里不需要再额外传 path，脚本会自动识别

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4